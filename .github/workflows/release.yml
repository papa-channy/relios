name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re-)release, e.g. v0.1.0'
        required: true

permissions:
  contents: write

jobs:
  verify:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test --parallel

  release:
    runs-on: ubuntu-latest
    needs: verify
    concurrency:
      group: tap-update
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag + prerelease flag
        id: meta
        env:
          RAW_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          TAG="$RAW_TAG"
          # Validate: tag must match vX.Y.Z with optional -suffix (semver-ish).
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid tag format: $TAG"
            exit 1
          fi
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG prerelease=$PRERELEASE"

      - name: Compute source tarball SHA256
        id: sha
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          URL="https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz"
          curl -fsSL "$URL" -o source.tar.gz
          SHA=$(sha256sum source.tar.gz | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Tarball $URL -> $SHA"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.prerelease == 'false' && 'true' || 'false' }}

      - name: Update Homebrew tap (stable only)
        if: steps.meta.outputs.prerelease == 'false'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          SHA256: ${{ steps.sha.outputs.sha }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: bash scripts/update-tap-formula.sh
